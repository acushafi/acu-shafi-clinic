<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcuClinic Management</title>
    <!-- Modern web font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for medical/UI elements -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style2.css">
    <link rel="stylesheet" href="css/style3.css">
    
    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="/icon.svg">
</head>

<body class="theme-light">
    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="ph ph-activity main-logo"></i>
            <h1 class="brand-name">AcuClinic</h1>
            <button id="closeSidebarBtn" class="mobile-only icon-btn"><i class="ph ph-x"></i></button>
        </div>

        <ul class="nav-links">
            <li>
                <a href="#dashboard" class="nav-item active" data-route="dashboard">
                    <i class="ph ph-squares-four"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="#admin" class="nav-item" data-route="admin" style="display: none; color: var(--brand-primary); font-weight: 500;">
                    <i class="ph ph-shield-star"></i>
                    <span>Platform Admin</span>
                </a>
            </li>
            <li>
                <a href="#patients" class="nav-item" data-route="patients">
                    <i class="ph ph-users"></i>
                    <span>Patients</span>
                </a>
            </li>
            <li>
                <a href="#visits" class="nav-item" data-route="visits">
                    <i class="ph ph-calendar-plus"></i>
                    <span>Visits</span>
                </a>
            </li>
            <li>
                <a href="#schemes" class="nav-item" data-route="schemes">
                    <i class="ph ph-package"></i>
                    <span>Schemes</span>
                </a>
            </li>
            <li>
                <a href="#payments" class="nav-item" data-route="payments">
                    <i class="ph ph-currency-circle-dollar"></i>
                    <span>Payments</span>
                </a>
            </li>
            <li>
                <a href="#expenses" class="nav-item" data-route="expenses">
                    <i class="ph ph-receipt"></i>
                    <span>Expenses</span>
                </a>
            </li>
            <li>
                <a href="#finance" class="nav-item" data-route="finance">
                    <i class="ph ph-chart-line-up"></i>
                    <span>Finance</span>
                </a>
            </li>
            <li>
                <a href="#analytics" class="nav-item" data-route="analytics">
                    <i class="ph ph-chart-bar"></i>
                    <span>Clinical Analytics</span>
                </a>
            </li>
            <li>
                <a href="#availability" class="nav-item" data-route="availability">
                    <i class="ph ph-clock"></i>
                    <span>Clinic Availability</span>
                </a>
            </li>
            <li>
                <a href="#settings" class="nav-item" data-route="settings">
                    <i class="ph ph-gear"></i>
                    <span>Settings & Sync</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="avatar">Dr</div>
                <div class="details">
                    <span class="name">Dr. Shafi</span>
                    <span class="role">Admin (Sync: Offline)</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <header class="topbar">
            <button id="openSidebarBtn" class="mobile-only icon-btn"><i class="ph ph-list"></i></button>
            <h2 id="pageTitle">Dashboard</h2>
            <div class="topbar-actions" style="display: flex; align-items: center; gap: 10px;">
                <button class="primary-btn pulse-glow" id="quickAddPatientBtn">
                    <i class="ph ph-plus"></i> New Patient
                </button>
                <button class="secondary-btn btn-sm" id="logoutBtn" style="border-color: var(--error); color: var(--error);">
                    <i class="ph ph-sign-out"></i> Logout
                </button>
            </div>
        </header>

        <!-- Dynamic router content goes here -->
        <div id="router-view" class="content-area">
            <!-- Loading state placeholder -->
            <div class="loading-state">
                <i class="ph ph-spinner-gap spin"></i>
                <p>Initializing System...</p>
            </div>
        </div>
    </main>

    <!-- Global Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Global Modal Container -->
    <div id="modalOverlay" class="modal-overlay hidden">
        <div id="modalContent" class="modal-content">
            <!-- Dynamic modal injected here -->
        </div>
    </div>

    <!-- Initialization Scripts -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
